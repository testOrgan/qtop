name: build-qtop

on:
  push:
    branches:
      - main
      - develop
      - 'releases/**'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  modern-python:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.10.14'
          - '3.12.3'
    env:
      FORTIFY_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'origin/develop' }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: make ci-deps PYTHON=python
      - run: make github-ci PYTHON=python
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: sample-gate-${{ matrix.python-version }}
          path: artifacts/sample-gate/

  almalinux-python36:
    runs-on: ubuntu-24.04
    container: almalinux:8
    steps:
      - run: |
          dnf -y install git make findutils
          dnf -y install python36
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - run: |
          PYTHON_BIN="$(command -v python3.6)"
          "$PYTHON_BIN" --version
          make compat-py36 PYTHON="$PYTHON_BIN"
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: sample-gate-python3.6-almalinux8
          path: artifacts/sample-gate-py36/

  build:
    needs:
      - modern-python
      - almalinux-python36
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12.3'
      - run: make github-build PYTHON=python
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: qtop-dist
          path: dist/
