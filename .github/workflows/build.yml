name: build-qtop

on:
  push:
    branches:
      - main
      - develop
      - 'releases/**'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  modern-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.10.14'
          - '3.12.3'
    env:
      FORTIFY_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'origin/develop' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - run: make ci-deps PYTHON=python
      - run: make github-ci PYTHON=python
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: sample-gate-${{ matrix.python-version }}
          path: artifacts/sample-gate/

  almalinux-python36:
    runs-on: ubuntu-latest
    container: almalinux:8
    steps:
      - run: |
          dnf -y install git make findutils
          dnf -y install python36 || dnf -y install python3
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - run: |
          PYTHON_BIN="$(command -v python3.6 || command -v python3)"
          "$PYTHON_BIN" --version
          make compat-py36 PYTHON="$PYTHON_BIN"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: sample-gate-python3.6-almalinux8
          path: artifacts/sample-gate-py36/

  build:
    needs:
      - modern-python
      - almalinux-python36
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12.3'
      - run: make ci-deps PYTHON=python
      - run: make github-build PYTHON=python
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: qtop-dist
          path: dist/
